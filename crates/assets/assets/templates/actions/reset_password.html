<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset Password - {{ site_name }}</title>
        <style>
            :root {
                color-scheme: light;
                font-family:
                    "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: linear-gradient(120deg, #ecfeff 0%, #f8fafc 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #111827;
            }

            .card {
                width: min(92vw, 520px);
                background: #ffffff;
                border-radius: 14px;
                box-shadow: 0 16px 40px rgba(15, 23, 42, 0.1);
                padding: 28px 24px;
            }

            .eyebrow {
                margin: 0 0 10px;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #0f766e;
            }

            h1 {
                margin: 0 0 12px;
                font-size: 24px;
            }

            p {
                margin: 0 0 14px;
                line-height: 1.6;
            }

            .meta {
                font-size: 14px;
                color: #475569;
            }

            .panel {
                margin-top: 18px;
                border-radius: 12px;
                border: 1px solid #cbd5e1;
                background: #f8fafc;
                padding: 16px;
            }

            .panel strong {
                display: block;
                margin-bottom: 8px;
                font-size: 15px;
            }

            .panel p {
                margin-bottom: 0;
                font-size: 14px;
                color: #475569;
            }

            .panel.warning {
                border-color: #fecaca;
                background: #fef2f2;
            }

            .panel.info {
                border-color: #bfdbfe;
                background: #eff6ff;
            }

            form {
                display: grid;
                gap: 12px;
                margin-top: 18px;
            }

            label {
                font-size: 14px;
                font-weight: 600;
            }

            input {
                width: 100%;
                box-sizing: border-box;
                border: 1px solid #cbd5e1;
                border-radius: 10px;
                padding: 10px 12px;
                font-size: 15px;
            }

            button {
                border: none;
                border-radius: 10px;
                background: #0f766e;
                color: #ffffff;
                padding: 10px 16px;
                font-size: 15px;
                cursor: pointer;
            }

            button:disabled {
                cursor: not-allowed;
                opacity: 0.7;
            }

            #status {
                margin-top: 14px;
                font-size: 14px;
                min-height: 20px;
            }

            #status.error {
                color: #b91c1c;
            }

            #status.success {
                color: #166534;
            }

            [hidden] {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <main class="card">
            <p class="eyebrow">Account Security</p>
            <h1 id="title">Reset your password</h1>
            <p id="description" class="meta"></p>

            <div
                id="reset-context"
                data-mode="{{ mode }}"
                data-auth-check-api="{{ auth_check_api }}"
                data-submit-api="{{ submit_api }}"
                data-token="{{ token or '' }}"
                data-initial-error="{{ initial_error }}"
                data-success-message="{{ success_message }}"
            ></div>

            <section id="loading-panel" class="panel info" hidden>
                <strong>Checking your sign-in status</strong>
                <p>We need an active session before showing the password form.</p>
            </section>

            <section id="login-required-panel" class="panel warning" hidden>
                <strong>Sign in required</strong>
                <p>Please sign in first, then reopen this page to change your password.</p>
            </section>

            <section id="invalid-panel" class="panel warning" hidden>
                <strong>Reset link unavailable</strong>
                <p id="invalid-message">Invalid or expired reset link.</p>
            </section>

            <form id="reset-form" hidden>
                <div id="old-password-group" hidden>
                    <label for="old-password">Current password</label>
                    <input
                        id="old-password"
                        name="old_password"
                        type="password"
                        autocomplete="current-password"
                        required
                    />
                </div>
                <div>
                    <label for="new-password">New password</label>
                    <input
                        id="new-password"
                        name="new_password"
                        type="password"
                        autocomplete="new-password"
                        required
                    />
                </div>
                <div>
                    <label for="confirm-new-password">Confirm new password</label>
                    <input
                        id="confirm-new-password"
                        name="confirm_new_password"
                        type="password"
                        autocomplete="new-password"
                        required
                    />
                </div>
                <button id="reset-btn" type="submit">
                    Reset Password
                </button>
            </form>
            <p id="status"></p>
        </main>

        <script>
            (async function () {
                const context = document.getElementById("reset-context");
                const form = document.getElementById("reset-form");
                const title = document.getElementById("title");
                const description = document.getElementById("description");
                const loadingPanel = document.getElementById("loading-panel");
                const loginRequiredPanel = document.getElementById(
                    "login-required-panel"
                );
                const invalidPanel = document.getElementById("invalid-panel");
                const invalidMessage = document.getElementById("invalid-message");
                const oldPasswordGroup = document.getElementById(
                    "old-password-group"
                );
                const oldPasswordInput = document.getElementById("old-password");
                const resetBtn = document.getElementById("reset-btn");
                const status = document.getElementById("status");

                const mode = context?.dataset?.mode || "";
                const authCheckApi = context?.dataset?.authCheckApi || "";
                const submitApi = context?.dataset?.submitApi || "";
                const token = context?.dataset?.token || "";
                const initialError = context?.dataset?.initialError || "";
                const successMessage = context?.dataset?.successMessage || "";

                function showView(view) {
                    loadingPanel.hidden = view !== "loading";
                    loginRequiredPanel.hidden = view !== "login-required";
                    invalidPanel.hidden = view !== "invalid";
                    form.hidden = view !== "form";
                }

                function configurePasswordMode(kind) {
                    showView("form");
                    status.className = "";
                    status.textContent = "";

                    if (kind === "token") {
                        title.textContent = "Set a new password";
                        description.textContent =
                            "Use the reset link to set a new password for your account.";
                        oldPasswordGroup.hidden = true;
                        oldPasswordInput.required = false;
                        resetBtn.textContent = "Reset Password";
                    } else {
                        title.textContent = "Change your password";
                        description.textContent =
                            "Update the password for the account currently signed in.";
                        oldPasswordGroup.hidden = false;
                        oldPasswordInput.required = true;
                        resetBtn.textContent = "Change Password";
                    }
                }

                function showInvalid(message) {
                    title.textContent = "Reset link unavailable";
                    description.textContent =
                        "Request a new reset email and try again.";
                    invalidMessage.textContent = message;
                    showView("invalid");
                }

                function showLoginRequired() {
                    title.textContent = "Sign in required";
                    description.textContent =
                        "We only show the password-change form for an active signed-in session.";
                    showView("login-required");
                }

                if (!form || !resetBtn || !submitApi || !title || !description) {
                    status.className = "error";
                    status.textContent = "Unable to load reset form.";
                    return;
                }

                if (initialError || mode === "invalid") {
                    showInvalid(initialError || "Invalid or expired reset link.");
                    return;
                }

                if (mode === "token") {
                    configurePasswordMode("token");
                } else if (mode === "session-check") {
                    title.textContent = "Checking your sign-in status";
                    description.textContent =
                        "We need to confirm your current session before showing the password form.";
                    showView("loading");

                    try {
                        const response = await fetch(authCheckApi, {
                            method: "GET",
                            headers: { Accept: "application/json" },
                            credentials: "include",
                        });

                        let payload = null;
                        try {
                            payload = await response.json();
                        } catch (_ignored) {
                            payload = null;
                        }

                        if (response.ok && payload && payload.code === 200) {
                            configurePasswordMode("password");
                        } else {
                            showLoginRequired();
                        }
                    } catch (_err) {
                        title.textContent = "Unable to verify sign-in status";
                        description.textContent =
                            "Please refresh the page and try again.";
                        loginRequiredPanel.querySelector("p").textContent =
                            "We could not reach the account API right now. Please retry in a moment.";
                        showView("login-required");
                    }
                }

                form.addEventListener("submit", async function (event) {
                    event.preventDefault();

                    const formData = new FormData(form);
                    const newPassword = String(formData.get("new_password") || "");
                    const confirmNewPassword = String(
                        formData.get("confirm_new_password") || ""
                    );

                    if (newPassword !== confirmNewPassword) {
                        status.className = "error";
                        status.textContent = "New passwords do not match.";
                        return;
                    }

                    const payload =
                        mode === "token"
                            ? {
                                  token,
                                  new_password: newPassword,
                              }
                            : {
                                  old_password: String(
                                      formData.get("old_password") || ""
                                  ),
                                  new_password: newPassword,
                              };

                    status.className = "";
                    status.textContent = "Submitting...";
                    resetBtn.disabled = true;

                    try {
                        const response = await fetch(submitApi, {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            credentials: "include",
                            body: JSON.stringify(payload),
                        });

                        let payload = null;
                        try {
                            payload = await response.json();
                        } catch (_ignored) {
                            payload = null;
                        }

                        if (response.ok && payload && payload.code === 200) {
                            status.className = "success";
                            status.textContent =
                                successMessage || "Password updated.";
                            form.reset();
                            return;
                        }

                        const message =
                            payload && payload.message
                                ? payload.message
                                : "Password update failed. Please try again.";
                        status.className = "error";
                        status.textContent = message;
                        resetBtn.disabled = false;
                    } catch (_err) {
                        status.className = "error";
                        status.textContent =
                            "Network error. Please check your connection and retry.";
                        resetBtn.disabled = false;
                    }
                });
            })();
        </script>
    </body>
</html>
