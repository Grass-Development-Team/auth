[workspace]
members = [
    "crates/core",
    "crates/entities",
    "crates/migrations",
    "crates/repository",
    "crates/services",
    "crates/shared",
]

[workspace.dependencies]
axum = "0.8"
tower = { version = "0.5", features = ["full"] }

serde = "1.0"
serde_json = "1.0"
toml = "0.8"

tokio = { version = "1", features = ["full"] }
